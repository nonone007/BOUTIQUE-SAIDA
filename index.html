  /* ╔══════════════════════════════════════════════════════════════════════════╗
     ║  SHOWCASE - todayListStep2Grid (Horizontal Scroll)                       ║
     ║  Minimal Elegance with Floating Price Tag Design                         ║
     ╚══════════════════════════════════════════════════════════════════════════╝ */

  /* Wrapper: overflow visible so hover lift is never clipped */
  .today-article-grid-wrap {
    overflow: visible;
    padding: 0 0 0 0;
  }

  /* Horizontal Scroll Container - padding allows hover lift without clipping */
  .today-article-grid {
    display: flex;
    flex-direction: row;
    gap: 16px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 8px 8px 8px 12px;
    margin-top: 0;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    scroll-padding-left: 20px;
    scroll-padding-right: 20px;
    -webkit-overflow-scrolling: touch;
  }

  .today-article-grid::-webkit-scrollbar {
    height: 6px;
  }

  .today-article-grid::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.06);
    border-radius: 3px;
  }

  .today-article-grid::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 3px;
  }

  /* Product Card - PC: fixed 170×240, Mobile: 130×170 */
  .today-article-grid .product-tile {
    flex: 0 0 auto;
    width: 170px;
    height: 240px;
    min-height: 240px;
    display: grid;
    grid-template-rows: 170px minmax(70px, auto);
    position: relative;
    background: var(--card);
    border-radius: 12px;
    overflow: visible;
    cursor: pointer;
    scroll-snap-align: start;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  /* Hover lift effect - Amazon-like card hover */
  .today-article-grid .product-tile:hover {
    transform: translateY(-8px);
    z-index: 10;
    box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.25), 0 4px 12px -4px rgba(0, 0, 0, 0.15);
  }

  /* Selected state - above other cards (no green highlight) */
  .today-article-grid .product-tile.selected {
    z-index: 10;
  }

  .today-article-grid .product-tile:active {
    transform: translateY(-4px);
    transition-duration: 0.15s;
  }

  /* Image Frame */
  .today-article-grid .product-tile__frame {
    position: relative;
    display: grid;
    place-items: center;
    background: linear-gradient(145deg, #0c1424 0%, #162033 100%);
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    box-shadow: 
      0 8px 32px -8px rgba(0, 0, 0, 0.4),
      inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  .today-article-grid .product-tile__frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease, opacity 0.3s ease;
  }

  .today-article-grid .product-tile:hover .product-tile__frame img {
    transform: scale(1.08);
  }

  /* Placeholder */
  .today-article-grid .product-tile__empty {
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    font-size: 3rem;
    color: var(--muted);
    opacity: 0.5;
  }

  /* Floating Price Badge - Green like price-block but opaque */
  .today-article-grid .product-tile__badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 6px 14px;
    background: linear-gradient(120deg, rgba(34, 197, 94, 0.9), rgba(34, 197, 94, 0.8));
    border-radius: 20px;
    border: 1px solid rgba(34, 197, 94, 0.95);
    box-shadow: 0 4px 12px -2px rgba(34, 197, 94, 0.5);
    font-size: 0.9rem;
    font-weight: 700;
    color: #052e17;
    z-index: 5;
    transform: translateY(0);
    opacity: 1;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Dark mode badge */
  [data-theme="dark"] .today-article-grid .product-tile__badge {
    background: linear-gradient(120deg, rgba(34, 197, 94, 0.95), rgba(34, 197, 94, 0.85));
    border-color: rgba(34, 197, 94, 1);
    color: #052e17;
    box-shadow: 0 4px 16px -2px rgba(34, 197, 94, 0.6);
  }

  /* Info Section - Name only */
  .today-article-grid .product-tile__details {
    padding: 12px 4px 8px;
  }

  /* Product Name - Centered */
  .today-article-grid .product-tile__name {
    margin: 0;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    text-align: center;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    overflow: hidden;
  }

  /* Dark Mode - Noticeable border for each article */
  [data-theme="dark"] .today-article-grid .product-tile {
    background: transparent;
    border: 1.5px solid rgba(148, 163, 184, 0.45) !important;
    box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.15), 0 4px 12px -4px rgba(0, 0, 0, 0.4) !important;
  }

  [data-theme="dark"] .today-article-grid .product-tile:hover {
    border-color: rgba(148, 163, 184, 0.65) !important;
    box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.25), 0 12px 24px -8px rgba(0, 0, 0, 0.5) !important;
  }

  [data-theme="dark"] .today-article-grid .product-tile__frame {
    background: linear-gradient(145deg, #0a101c 0%, #131d2e 100%);
    box-shadow: 
      0 8px 32px -8px rgba(0, 0, 0, 0.6),
      inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  }

  /* Mobile - Fixed size 130x150 */
  @media (max-width: 768px) {
    .today-article-grid {
      gap: 12px;
      padding: 8px 16px 16px;
    }

    .today-article-grid .product-tile {
      width: 130px;
      height: 170px;
      min-height: 170px;
      grid-template-rows: 110px minmax(60px, auto);
    }

    .today-article-grid .product-tile__frame img,
    .today-article-grid .product-tile__empty {
      width: 100%;
      height: 100%;
    }

    .today-article-grid .product-tile__badge {

      font-size: 0.8rem;

      transform: translateY(0);

    .today-article-grid .product-tile__details {

      font-size: 0.85rem;

  @media (max-width: 620px) {
    .today-article-grid .product-tile {

  /* Extra Small */
  @media (max-width: 400px) {
    .today-article-grid {
      gap: 10px;
      padding: 8px 12px 14px;
    }

    .today-article-grid .product-tile {
      width: 130px;

      min-height: 170px;

    }

    .today-article-grid .product-tile__frame img,

      height: 100%;
    }

    }

      font-size: 0.78rem;
      line-height: 1.15;
    }
  }

  /* Reduced Motion */
  @media (prefers-reduced-motion: reduce) {
    .today-article-grid .product-tile {
      transition: none;
    }
    .today-article-grid .product-tile:hover {
      transform: none;
    }
  }

    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .switch-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .switch-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .switch-slider {
      background-color: #2196F3;
    }
    input:checked + .switch-slider:before {
      transform: translateX(26px);
    }
    .switch-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      transition: .4s;
      left: 28px;
    }
    input:checked + .switch-slider .switch-icon {

      padding: 6px 10px;

    .lightbox-close,
    .modal-overlay .close-btn,
    .modal-overlay button[type="button"].close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(220, 38, 38, 0.1) 100%);
      border: 2px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      font-size: 24px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      z-index: 10;
      line-height: 1;
    }

    .lightbox-close:hover,
    .modal-overlay .close-btn:hover,
    .modal-overlay button[type="button"].close:hover {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.25) 0%, rgba(220, 38, 38, 0.2) 100%);

      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);

    .lightbox-close:active,
    .modal-overlay .close-btn:active,
    .modal-overlay button[type="button"].close:active {
      transform: scale(0.95) rotate(90deg);
    }

    /* Back to Top Button - Advanced Design */
    .back-to-top {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent) 0%, #f97316 100%);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #ffffff;
      box-shadow: 
        0 8px 24px rgba(245, 158, 11, 0.4),
        0 4px 12px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px) scale(0.8);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      overflow: hidden;
    }
    
    .back-to-top::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .back-to-top:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .back-to-top:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 
        0 12px 32px rgba(245, 158, 11, 0.5),
        0 6px 16px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    
    .back-to-top:active {
      transform: translateY(-2px) scale(1.02);
    }
    
    .back-to-top.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }
    
    .back-to-top-icon {
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }
    
    .back-to-top:hover .back-to-top-icon {
      transform: translateY(-2px);
    }
    
    /* Dark Mode Styles */
    [data-theme="dark"] .back-to-top {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 
        0 8px 24px rgba(59, 130, 246, 0.4),
